
##########################################################################
## Data generation arguments
##########################################################################

trigger_time = 1126259642.413

##########################################################################
## Detector arguments
##########################################################################

detectors = [H1, L1, V1]
generation-seed=1187008889
tukey-roll-off=0.4
resampling-method=lal

################################################################################
## Injection arguments
################################################################################

injection = True
zero-noise = True
injection_waveform_approximant = ripple 
injection-frequency-domain-source-model = ripple_binary_black_hole

##########################################################################
## Likelihood arguments
##########################################################################

distance-marginalization=False
phase-marginalization=False
time-marginalization=False

reference_frame=sky
time_reference=geocent

##########################################################################
## Prior arguments
##########################################################################

deltaT=0.2
enforce-signal-duration=False

##########################################################################
##  Waveform arguments
##########################################################################

reference-frequency = 10.0
minimum-frequency = {H1:10.00, L1:10.00, V1:10.00, waveform:10.00}
sampling-frequency= 512

waveform-generator=bilby.gw.waveform_generator.WaveformGenerator

waveform-approximant = ripple_ppe
frequency-domain-source-model = ripple_binary_black_hole_ppe

catch-waveform-errors = True

##########################################################################
## Slurm Settings
##########################################################################

nodes = 2
ntasks-per-node = 64
mem-per-cpu = 4000
time = 30:00:00
extra-lines = cd $SLURM_SUBMIT_DIR; source $HOME/.bashrc; conda activate phenom-distribution-ppe; 
slurm-extra-lines = partition=GravityTheory

##########################################################################
## Output arguments
##########################################################################
no-plot = False
plot-trace = True
plot-data = True
plot-injection = True
result-format=json

################################################################################
## Job submission arguments
################################################################################

label = ppE
outdir = outdir

###############################################################################
## Sampler settings
################################################################################

sampler = dynesty
nlive = 1500
nact = 2
dlogz= 0.01

dynesty-sample=acceptance-walk
dynesty-bound=live
walks=150
maxmcmc=5000

check-point-deltaT = 10800
n-check-point = 100000
sampling-seed = 659216
